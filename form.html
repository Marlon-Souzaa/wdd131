<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Activity</title>
    <meta name="author" content="Marlon A A Souza">
    <meta name="description" content="A form to a product review with a confirmation page ">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    

    
</head>
<body>

    <header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">

        
        <label for="product">Product Name (Required) </label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        
        <fieldset>
            <legend>Overall Rating (Required)</legend>

            <input type="radio" id="rating1" name="rating" value="1" required>
            <label for="rating1">☆</label>

            <input type="radio" id="rating2" name="rating" value="2" required>
            <label for="rating2">☆☆</label>

            <input type="radio" id="rating3" name="rating" value="3" required>
            <label for="rating3">☆☆☆</label>

            <input type="radio" id="rating4" name="rating" value="4" required>
            <label for="rating4">☆☆☆☆</label>

            <input type="radio" id="rating5" name="rating" value="5" required>
            <label for="rating5">☆☆☆☆☆</label>
        </fieldset>

        
        <label for="date">Date of Installation (Required)</label>
        <input type="date" id="date" name="date" required>

       
        <fieldset>
            <legend>Which features did you find useful? (Optional) </legend>

            <input type="checkbox" id="durability" name="features" value="Durability">
            <label for="durability">Durability</label>

            <input type="checkbox" id="ease" name="features" value="Ease of Use">
            <label for="ease">Ease to Use</label>
            
            
            <input type="checkbox" id="performance" name="features" value="Performance">
            <label for="performance">Performance</label>
            
            <input type="checkbox" id="design" name="features" value="Design">
            <label for="design">Design</label>

        </fieldset>

        
        <label for="review">Written Review (Optional)</label>
        <textarea id="review" name="review"></textarea>

        
        <label for="username">Your Name (Optional)</label>
        <input type="text" id="username" name="username">

        
        <input type="submit" value="Post Review">

    </form>
</main>

<footer>
    <p>©<span id="year"></span> Marlon A A Souza 😎 São Paulo - Brazil</p>
    <p>Last Modification: <span id="lastModified"></span></p>
</footer>
        

    
</body>
</html>
